- name: Cisco First Playbook
  hosts: iosxe1*
  gather_facts: false
  remote_user: student
  tasks:
    - name: Block of IOS Tasks
      block:
        - name: Change Description for GI1
          cisco.ios.ios_interfaces:
            config:
              - name: GigabitEthernet1
                description: "Jodi Learning Ansible"
                enabled: true

        - name: Change Description for GI2
          cisco.ios.ios_interfaces:
            config:
              - name: GigabitEthernet2
                description: "Pawel Learning Ansible"
                enabled: true

        - name: Task that somehow fails
          ansible.builtin.command: sleep 2

        - name: Save Configuration
          cisco.ios.ios_config:
            save_when: always
      when: ansible_network_os == "cisco.ios.ios"
      rescue:
        - name: Rollback Changes
          ansible.builtin.debug:
            msg: "MayDay MayDay"

        - name: Rollback Description for GI1
          cisco.ios.ios_interfaces:
            config:
              - name: GigabitEthernet1
                description: "Original Description GI1"
                enabled: true

        - name: Rollback Description for GI2
          cisco.ios.ios_interfaces:
            config:
              - name: GigabitEthernet2
                description: "Backup Description GI2"
                enabled: true
      always:
        - name: Inform StakeHolder
          ansible.builtin.debug:
            msg: "I did what i DID Mail Sent"

