- name: Cisco First Playbook
  hosts: iosxe1*
  gather_facts: false
  remote_user: student
  # ignore_errors: true
  tasks:
    - name: Displaying VLAN id 150 information
      cisco.ios.ios_command:
        commands:
          - show vlan id 150
      ignore_errors: true

    - name: Change Description for GI1
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: "Jodi Learning Ansible 1"
            enabled: true

    - name: Save Configuration
      cisco.ios.ios_config:
        save_when: always
