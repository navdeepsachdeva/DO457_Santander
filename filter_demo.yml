- name: Filters Demo
  hosts: iosxe1*
  gather_facts: false
  vars:
    myip: '192.0.2.5/24'
  vars_files:
    - vars/outside_vars.yml
  tasks:
    - name: Text Filter
      ansible.builtin.debug:
        msg: >
          {{ ansible_user | upper }} with 
          {{ ansible_connection | capitalize }} and 
          {{ inventory_hostname | length }}

    - name: IP Filters
      ansible.builtin.debug:
        msg: "{{ '192.0.2.5/24' | ansible.utils.ipaddr('next_usable') }}"
        #msg: "{{ myip | ansible.utils.ipaddr('next_usable') }}"
