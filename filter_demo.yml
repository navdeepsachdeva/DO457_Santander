        # msg: "{{ ip_list | ansible.utils.ipv4('broadcast') }}"
        # msg: "{{ ip_list | ansible.utils.ipv4('private') }}"
        # msg: "{{ ip_list | ansible.utils.ipv4('public') }}"
        # msg: "{{ ip_list | ansible.utils.ipv4 }}"
