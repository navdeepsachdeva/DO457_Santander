- name: Variable Demo
  hosts: cisco,arista
  gather_facts: false
  vars:
    floor_level: "Level 12 Play vars"

  # Level 13 User Interaction Variable floor_level
  # Development Env only
  vars_prompt:
    - name: floor_level
      prompt: "Which floor is your office ?"
      private: false

  # Level 14 from Outside floor_level
  vars_files:
    - vars/outside_vars.yml

  tasks:
    - name: Print Variable
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} == {{ floor_level }}"
        
