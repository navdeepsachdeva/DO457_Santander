# DO not do Syntax-Check
- name: Change Description for GI1
  cisco.ios.ios_interfaces:
    config:
      - name: GigabitEthernet1
        description: "Jodi Learning Ansible 1"
        enabled: true

- name: Change Description for GI2
  cisco.ios.ios_interfaces:
    config:
      - name: GigabitEthernet2
        description: "Jodi Learning Ansible 2"
        enabled: true

- name: Save Configuration
  cisco.ios.ios_config:
    save_when: always
